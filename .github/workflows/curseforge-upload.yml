name: Upload to CurseForge

on:
  push:
    branches:
      - main

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create zip
        run: |
          mkdir HallOfFallenHeroes
          cp *.lua *.toc HallOfFallenHeroes/
          zip -r HallOfFallenHeroes.zip HallOfFallenHeroes

      - name: Upload to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: "${{ secrets.HALLOFFALLENHEROES }}"
          project_id: "1516414"
          game_endpoint: "wow"
          file_path: "HallOfFallenHeroes.zip"
          game_versions: "12.0.5"
          release_type: "release"
          display_name: "HallOfFallenHeroes - ${{ github.event.head_commit.timestamp }}"
          changelog: "${{ github.event.head_commit.message }}"
          changelog_type: "markdown"